name: Actionlint

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run actionlint
        run: npm run lint:workflows
